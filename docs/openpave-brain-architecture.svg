<svg width="680" viewBox="0 0 680 780" role="img" xmlns="http://www.w3.org/2000/svg">
<title>OpenPAVE brain-inspired step function architecture</title>
<desc>Four sequential steps — capture, process, store, retrieve — each containing brain-region modules, with a cerebellum reflex path bypassing cognition and an MLX runtime substrate underneath.</desc>
<style>
.th{font:500 14px 'Anthropic Sans','Helvetica Neue',Arial,sans-serif}
.ts{font:400 12px 'Anthropic Sans','Helvetica Neue',Arial,sans-serif}
.tx{fill:#3a3a38}.tm{fill:#6b6a66}
.teal-t{fill:#085041}.teal-s{fill:#0F6E56}
.purp-t{fill:#3C3489}.purp-s{fill:#534AB7}
.cora-t{fill:#712B13}.cora-s{fill:#993C1D}
.gray-t{fill:#444441}.gray-s{fill:#5F5E5A}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<rect x="40" y="40" width="600" height="112" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
<text class="th tx" x="56" y="64" dominant-baseline="central">1 · Capture</text>
<text class="ts tm" x="624" y="64" text-anchor="end" dominant-baseline="central">perception + sensor fusion</text>
<rect x="56" y="84" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th teal-t" x="146" y="104" text-anchor="middle" dominant-baseline="central">Occipital · vision</text>
<text class="ts teal-s" x="146" y="122" text-anchor="middle" dominant-baseline="central">VLM tower + YOLO</text>
<rect x="250" y="84" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th teal-t" x="340" y="104" text-anchor="middle" dominant-baseline="central">Temporal · audio</text>
<text class="ts teal-s" x="340" y="122" text-anchor="middle" dominant-baseline="central">ASR + prosody</text>
<rect x="444" y="84" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th teal-t" x="534" y="104" text-anchor="middle" dominant-baseline="central">Parietal · pose</text>
<text class="ts teal-s" x="534" y="122" text-anchor="middle" dominant-baseline="central">SLAM + Kalman filter</text>

<line x1="340" y1="156" x2="340" y2="182" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="188" width="600" height="112" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
<text class="th tx" x="56" y="212" dominant-baseline="central">2 · Process</text>
<text class="ts tm" x="624" y="212" text-anchor="end" dominant-baseline="central">salience + cognition</text>
<rect x="56" y="232" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th purp-t" x="146" y="252" text-anchor="middle" dominant-baseline="central">Amygdala · salience</text>
<text class="ts purp-s" x="146" y="270" text-anchor="middle" dominant-baseline="central">tiny CNN/ViT · 50–200M</text>
<rect x="250" y="232" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th purp-t" x="340" y="252" text-anchor="middle" dominant-baseline="central">Frontal · planner</text>
<text class="ts purp-s" x="340" y="270" text-anchor="middle" dominant-baseline="central">Gemma4 2–4B MLX</text>
<rect x="444" y="232" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th purp-t" x="534" y="252" text-anchor="middle" dominant-baseline="central">Working memory</text>
<text class="ts purp-s" x="534" y="270" text-anchor="middle" dominant-baseline="central">recursive context</text>

<line x1="340" y1="304" x2="340" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="336" width="600" height="112" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
<text class="th tx" x="56" y="360" dominant-baseline="central">3 · Store</text>
<text class="ts tm" x="624" y="360" text-anchor="end" dominant-baseline="central">salience-gated writes</text>
<rect x="56" y="380" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th cora-t" x="146" y="400" text-anchor="middle" dominant-baseline="central">Shared encoder</text>
<text class="ts cora-s" x="146" y="418" text-anchor="middle" dominant-baseline="central">Fourier-Qwen2-VL-2B</text>
<rect x="250" y="380" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th cora-t" x="340" y="400" text-anchor="middle" dominant-baseline="central">Vector index</text>
<text class="ts cora-s" x="340" y="418" text-anchor="middle" dominant-baseline="central">FAISS-style index</text>
<rect x="444" y="380" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th cora-t" x="534" y="400" text-anchor="middle" dominant-baseline="central">Episode log</text>
<text class="ts cora-s" x="534" y="418" text-anchor="middle" dominant-baseline="central">append + prune</text>

<line x1="340" y1="452" x2="340" y2="478" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="40" y="484" width="600" height="112" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4"/>
<text class="th tx" x="56" y="508" dominant-baseline="central">4 · Retrieve</text>
<text class="ts tm" x="624" y="508" text-anchor="end" dominant-baseline="central">↻ back to working memory</text>
<rect x="56" y="528" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th cora-t" x="146" y="548" text-anchor="middle" dominant-baseline="central">Query encode</text>
<text class="ts cora-s" x="146" y="566" text-anchor="middle" dominant-baseline="central">reuses shared encoder</text>
<rect x="250" y="528" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th cora-t" x="340" y="548" text-anchor="middle" dominant-baseline="central">Similarity search</text>
<text class="ts cora-s" x="340" y="566" text-anchor="middle" dominant-baseline="central">top-k episodes</text>
<rect x="444" y="528" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th cora-t" x="534" y="548" text-anchor="middle" dominant-baseline="central">Reconstruction</text>
<text class="ts cora-s" x="534" y="566" text-anchor="middle" dominant-baseline="central">rebuilds scene context</text>

<path d="M 40 96 L 28 96 L 28 646 L 35 646" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)"/>

<rect x="40" y="624" width="600" height="44" rx="8" fill="#FAFAF7" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="th tx" x="340" y="646" text-anchor="middle" dominant-baseline="central">Cerebellum reflex path · MPC + sub-10M policy</text>

<rect x="40" y="684" width="600" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th gray-t" x="340" y="706" text-anchor="middle" dominant-baseline="central">MLX runtime · Apple silicon · unified memory</text>

<rect x="56" y="744" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts tm" x="72" y="749" dominant-baseline="central">perception</text>
<rect x="166" y="744" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts tm" x="182" y="749" dominant-baseline="central">cognition + salience</text>
<rect x="346" y="744" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts tm" x="362" y="749" dominant-baseline="central">memory</text>
<rect x="436" y="744" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts tm" x="452" y="749" dominant-baseline="central">runtime substrate</text>
</svg>
